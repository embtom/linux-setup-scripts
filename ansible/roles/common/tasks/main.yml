---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install packages
  ansible.builtin.apt:
    name:
      - build-essential
      - cmake
      - curl
      - git
      - just
      - shfmt
      - wget
    state: present
  become: true
