---
- name: Install podman
  ansible.builtin.apt:
    name: podman
    state: present
  become: true

- name: Ensure subuid entry for rootless podman
  ansible.builtin.lineinfile:
    path: /etc/subuid
    line: "{{ ansible_user }}:100000:65536"
    regexp: "^{{ ansible_user }}:"
    create: true
    mode: "0644"
  become: true
  register: podman_subuid_result

- name: Ensure subgid entry for rootless podman
  ansible.builtin.lineinfile:
    path: /etc/subgid
    line: "{{ ansible_user }}:100000:65536"
    regexp: "^{{ ansible_user }}:"
    create: true
    mode: "0644"
  become: true
  register: podman_subgid_result

- name: Install podman-compose for user via pip
  ansible.builtin.pip:
    name: podman-compose
    state: present
    extra_args: --user --break-system-packages

- name: Enable and start podman.socket for user
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true
    scope: user

- name: Enable systemd linger for user
  ansible.builtin.command:
    cmd: loginctl enable-linger {{ ansible_user }}
    creates: /var/lib/systemd/linger/{{ ansible_user }}
  become: true

- name: Register default podman system connection for user socket
  ansible.builtin.command:
    cmd: >
      podman system connection add --default podman-user
      unix:///run/user/{{ ansible_facts['user_uid'] }}/podman/podman.sock
  register: podman_connection_result
  changed_when: podman_connection_result.rc == 0
  failed_when:
    - podman_connection_result.rc != 0
    - "'already exists' not in podman_connection_result.stderr"

- name: Ensure containers config directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/containers"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: Deploy containers.conf
  ansible.builtin.copy:
    src: containers.conf
    dest: "{{ home_dir }}/.config/containers/containers.conf"
    owner: "{{ ansible_user }}"
    mode: "0644"

- name: Migrate podman storage when subuid/subgid changed
  ansible.builtin.command:
    cmd: podman system migrate
  changed_when: podman_subuid_result.changed or podman_subgid_result.changed
  when: podman_subuid_result.changed or podman_subgid_result.changed
